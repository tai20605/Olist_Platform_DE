# ─── QUAN TRỌNG ────────────────────────────────────────────────────────────────
# Tất cả credentials được đọc từ file .env (không được commit vào git).
# Setup lần đầu: cp .env.example .env → điền giá trị thực.
# ────────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  networks:
    - olist-network
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_PG_USER}:${AIRFLOW_PG_PASSWORD}@postgres-airflow/${AIRFLOW_PG_DB}
    AIRFLOW__CORE__FERNET_KEY: '${AIRFLOW_FERNET_KEY}'
    AIRFLOW_CONN_SPARK_DEFAULT: 'spark://?master=spark%3A%2F%2Fspark-master%3A7077'
    AIRFLOW_CONN_TRINO: 'trino://admin@trino:8080/olist'
    AIRFLOW_CONN_KAFKA: 'kafka://kafka:29092'
    AIRFLOW_CONN_POSTGRES_WAREHOUSE: 'postgresql://${WAREHOUSE_PG_USER}:${WAREHOUSE_PG_PASSWORD}@postgres-warehouse:5432/${WAREHOUSE_PG_DB}'
    OLIST_SIMULATE_PRODUCER: '/opt/airflow/kafka/simulation_produce_event.py'
    AIRFLOW_CONN_KAFKA_UI: '{"conn_type":"http","host":"kafka-ui","port":8080}'
    AIRFLOW_CONN_MINIO: '{"conn_type":"http","host":"minio","port":9000}'
    AIRFLOW_CONN_SPARK_MASTER: '{"conn_type":"http","host":"spark-master","port":8080}'
    AIRFLOW_UID: "50000"
    AIRFLOW_GID: "0"
    _AIRFLOW_WWW_USER_CREATE: 'true'
    _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER}
    _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_PASSWORD}
    _AIRFLOW_WWW_USER_ROLE: Admin
    _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_WWW_EMAIL}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./dbt:/opt/dbt
    - ./spark:/opt/spark
    - ./data:/opt/airflow/data
    - ./kafka:/opt/airflow/kafka
    - /var/run/docker.sock:/var/run/docker.sock
  user: "50000:0"
  depends_on:
    - postgres-airflow

services:
  # ─── Airflow Infrastructure ─────────────────────
  postgres-airflow:
    image: postgres:13
    container_name: postgres-airflow
    networks:
      - olist-network
    environment:
      POSTGRES_USER: ${AIRFLOW_PG_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_PG_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_PG_DB}
    ports:
      - "5403:5432"
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AIRFLOW_PG_USER} -d ${AIRFLOW_PG_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    networks:
      - olist-network
    depends_on:
      postgres-airflow:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db db-init || airflow db upgrade

        airflow users create \
          --username ${AIRFLOW_WWW_USER} \
          --password ${AIRFLOW_WWW_PASSWORD} \
          --firstname Admin \
          --lastname Olist \
          --role Admin \
          --email ${AIRFLOW_WWW_EMAIL} || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8085:8080"
    networks:
      - olist-network
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    networks:
      - olist-network
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── Realtime Mock Event Producer ────────────────
  mock-producer:
    build:
      context: .
      dockerfile: ./kafka/Dockerfile
    container_name: mock-producer
    networks:
      - olist-network
    volumes:
      - ./kafka/simulation_produce_event.py:/app/simulation_produce_event.py
      - ./data:/app/data
    working_dir: /app
    depends_on:
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
    restart: "no"

  # ─── Nessie Catalog ────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:0.104.5
    container_name: nessie
    networks:
      - olist-network
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: olist
      NESSIE_CATALOG_WAREHOUSES_OLIST_LOCATION: s3a://olist/
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: http://minio:9000
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ACCESS_KEY: ${MINIO_ROOT_USER}
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION: us-east-1
    restart: unless-stopped

  # ─── dbt Transformer ───────────────────────────
  dbt:
    build:
      context: .
      dockerfile: ./dbt/Dockerfile
    container_name: dbt
    networks:
      - olist-network
    user: "0:0"
    volumes:
      - ./dbt:/dbt
      - ./dbt/profiles.yml:/root/.dbt/profiles.yml
    working_dir: /dbt
    environment:
      DBT_TRINO_HOST: trino
      DBT_TRINO_PORT: 8080
      DBT_TRINO_SCHEMA: warehouse.bronze
      DBT_TRINO_CATALOG: olist
      DBT_TRINO_USER: admin
      DBT_PROFILES_DIR: /dbt
    depends_on:
      trino:
        condition: service_started
      minio:
        condition: service_started
    command: sleep infinity
    restart: unless-stopped

  # ─── Monitoring ────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - olist-network
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-postgresql-datasource
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - postgres-warehouse
      - trino
    restart: unless-stopped

  # ─── pgAdmin — PostgreSQL Warehouse UI ────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    networks:
      - olist-network
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@olist.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./postgres/pgadmin_servers.json:/pgadmin4/servers.json
    depends_on:
      postgres-warehouse:
        condition: service_healthy
    restart: unless-stopped

  # ─── Data Warehouse ────────────────
  postgres-warehouse:
    image: postgres:15
    container_name: postgres-warehouse
    networks:
      - olist-network
    ports:
      - "5402:5432"
    environment:
      POSTGRES_USER: ${WAREHOUSE_PG_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_PG_PASSWORD}
      POSTGRES_DB: ${WAREHOUSE_PG_DB}
    volumes:
      - postgres-warehouse-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${WAREHOUSE_PG_USER} -d ${WAREHOUSE_PG_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Apache Kafka ──────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - olist-network
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - olist-network
    ports:
      - "8086:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    networks:
      - olist-network
    ports:
      - "8089:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      - kafka
    restart: unless-stopped

  # ─── MinIO Object Storage ──────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - olist-network
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks:
      - olist-network
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " until (/usr/bin/mc alias set olist_local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo 'Waiting for MinIO...' && sleep 1; done; if ! /usr/bin/mc ls olist_local/olist > /dev/null 2>&1; then
        /usr/bin/mc mb olist_local/olist;
        echo 'Bucket olist created successfully.';
      else
        echo 'Bucket olist already exists.';
      fi; exit 0; "

  # ─── Trino Query Engine ────────────────────────
  trino:
    image: trinodb/trino:latest
    container_name: trino
    networks:
      - olist-network
    ports:
      - "8080:8080"
    volumes:
      - ./trino:/etc/trino
      - trino-data:/data/trino
    depends_on:
      - minio
      - nessie
    restart: unless-stopped

  # ─── Apache Spark ────
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    networks:
      - olist-network
    ports:
      - "8081:8080"
      - "7077:7077"
    environment:
      - SPARK_LOCAL_DIRS=/tmp/spark-local
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./spark:/opt/spark/work
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    networks:
      - olist-network
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_DIR=/tmp/spark-worker
      - SPARK_LOCAL_DIRS=/tmp/spark-local
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./spark:/opt/spark/work
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    restart: unless-stopped

  spark-iceberg-init:
    image: apache/spark:3.5.1
    container_name: spark-iceberg-init
    networks:
      - olist-network
    user: "0:0"
    environment:
      - SPARK_SUBMIT_OPTS=-Divy.home=/tmp/.ivy2 -Djava.net.preferIPv4Stack=true
      - SPARK_LOCAL_DIRS=/tmp/spark-local
    depends_on:
      - spark-master
      - minio
      - nessie
    volumes:
      - ./spark:/opt/spark/work
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    command: /opt/spark/bin/spark-submit --master spark://spark-master:7077 /opt/spark/work/setup/init_iceberg.py

  spark-streaming-ingestion:
    image: apache/spark:3.5.1
    container_name: spark-streaming-ingestion
    networks:
      - olist-network
    user: "0:0"
    environment:
      - SPARK_SUBMIT_OPTS=-Divy.home=/tmp/.ivy2 -Djava.net.preferIPv4Stack=true
      - SPARK_LOCAL_DIRS=/tmp/spark-local
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      spark-iceberg-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
    volumes:
      - ./spark:/opt/spark/work
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    command: /opt/spark/bin/spark-submit --master spark://spark-master:7077 /opt/spark/work/jobs/streaming_ingestion.py
    restart: unless-stopped

volumes:
  airflow-db-data:
  airflow-logs:
  grafana-data:
  pgadmin-data:
  postgres-warehouse-data:
  minio-data:
  trino-data:

networks:
  olist-network:
    name: olist-network
    driver: bridge
