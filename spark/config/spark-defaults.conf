# ─── CORE PACKAGES & EXTENSIONS ──────────────────────────────────────────────
spark.jars.packages=org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.77.1,org.apache.hadoop:hadoop-aws:3.3.4,org.postgresql:postgresql:42.7.3
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

# ─── ICEBERG CATALOG CONFIGURATION (NESSIE) ──────────────────────────────────
spark.sql.catalog.olist=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.olist.catalog-impl=org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.olist.uri=http://nessie:19120/api/v1
spark.sql.catalog.olist.ref=main
spark.sql.catalog.olist.authentication.type=NONE
spark.sql.catalog.olist.warehouse=s3a://olist/

# ─── S3 / MINIO STORAGE CONFIGURATION ────────────────────────────────────────
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=minioadmin
spark.hadoop.fs.s3a.secret.key=minioadmin123
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem

spark.worker.cleanup.enabled=true
spark.worker.cleanup.interval=60
spark.worker.cleanup.appDataTtl=3600
spark.cleaner.referenceTracking=true

# ─── RESOURCE LIMITS FOR LOCAL CONCURRENCY ───────────────────────────
spark.cores.max=2
spark.executor.cores=1
spark.executor.memory=1g
spark.driver.memory=1g