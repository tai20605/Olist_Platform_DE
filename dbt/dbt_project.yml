name: 'olist'
version: '1.0.0'
config-version: 2

profile: 'olist'
packages-install-path: "/home/airflow/dbt_packages"
model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  olist:
    bronze:
      +materialized: table
      +schema: bronze
      raw_events:
        +alias: raw_events_view
    silver:
      +materialized: table
      +schema: silver
    gold:
      +materialized: table
      +schema: gold